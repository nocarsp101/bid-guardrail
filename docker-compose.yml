services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - BID_GUARDRAIL_DATA_DIR=/data
    volumes:
      - ./_data:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
